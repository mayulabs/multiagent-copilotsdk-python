# ============================================================================
# Dependabot — automated dependency update PRs and security alerts
# Docs: https://docs.github.com/code-security/dependabot
# ============================================================================
version: 2
updates:
  # --- Python dependencies (requirements.txt) ---
  - package-ecosystem: "pip"
    directory: "/src/python"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "deps"
      include: "scope"
    # New feature branches should target develop per the gitflow model.
    target-branch: "develop"

  # --- GitHub Actions used by the workflows ---
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"
    target-branch: "develop"
