# ============================================================================
# Auto PR: develop -> main
# When develop is updated, open (or reuse) a release PR into main.
# Gitflow: feature branch -> develop -> main
# ============================================================================
name: Auto PR develop to main

on:
  push:
    branches:
      - develop

permissions:
  contents: read
  pull-requests: write

jobs:
  open-pr:
    name: Open release PR into main
    if: ${{ !github.event.deleted }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create or reuse PR develop -> main
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          existing=$(gh pr list --head develop --base main --state open \
            --json number --jq '.[0].number' 2>/dev/null || echo "")

          if [ -n "$existing" ]; then
            echo "Release PR already open develop -> main: #$existing"
            exit 0
          fi

          gh pr create \
            --base main \
            --head develop \
            --title "Release: merge develop into main" \
            --body "Automated release PR from \`develop\` into \`main\`.\n\nReview the accumulated changes before merging."
