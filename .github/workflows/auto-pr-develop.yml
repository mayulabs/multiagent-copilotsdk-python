# ============================================================================
# Auto PR: feature branch -> develop
# When any non-integration branch is pushed, open (or reuse) a PR into develop.
# Gitflow: feature branch -> develop -> main
# ============================================================================
name: Auto PR to develop

on:
  push:
    branches-ignore:
      - develop
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  open-pr:
    name: Open PR into develop
    # Skip branch-deletion push events (nothing to open a PR for).
    if: ${{ !github.event.deleted }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create or reuse PR into develop
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ github.ref_name }}
        run: |
          # Only branches (ignore tag pushes)
          if [ "${{ github.ref_type }}" != "branch" ]; then
            echo "Not a branch push — skipping."
            exit 0
          fi

          # Ensure the develop branch exists before targeting it
          if ! git ls-remote --exit-code --heads origin develop >/dev/null 2>&1; then
            echo "::warning::'develop' branch does not exist yet — skipping auto PR."
            exit 0
          fi

          existing=$(gh pr list --head "$BRANCH" --base develop --state open \
            --json number --jq '.[0].number' 2>/dev/null || echo "")

          if [ -n "$existing" ]; then
            echo "PR already open for $BRANCH -> develop: #$existing"
            exit 0
          fi

          gh pr create \
            --base develop \
            --head "$BRANCH" \
            --title "Merge \`$BRANCH\` into develop" \
            --body "Automated PR opened from a push to \`$BRANCH\`.\n\nGitflow: \`$BRANCH\` → develop → main."
