# ============================================================================
# Develop Pipeline
# ----------------------------------------------------------------------------
# Runs everything related to getting code INTO develop:
#   - On a feature-branch push  -> run the pipeline AND open/reuse a PR to develop
#   - On a pull_request -> develop -> run the pipeline
#
# Gitflow: feature branch -> develop -> main
# The whole pipeline (lint, security, tests, CodeQL) lives here so this file is
# the single place that governs quality gates for the develop stage.
# ============================================================================
name: Develop Pipeline

on:
  push:
    # Feature branches push here. develop/main have their own flow (main.yml).
    branches-ignore:
      - develop
      - main
  pull_request:
    branches:
      - develop

concurrency:
  group: develop-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # --------------------------------------------------------------------------
  # Lint — static style/quality checks with Ruff
  # --------------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff lint
        run: ruff check src/python

      - name: Ruff format check
        run: ruff format --check src/python
        continue-on-error: true

  # --------------------------------------------------------------------------
  # Security — SAST (bandit), dependency audit (pip-audit), secret scan (gitleaks)
  # --------------------------------------------------------------------------
  security:
    name: Security checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install security tools
        run: pip install "bandit[toml]" pip-audit

      - name: Bandit (SAST)
        run: bandit -c pyproject.toml -r src/python -x "*/venv/*,*/test_*.py" -ll

      - name: pip-audit (dependency vulnerabilities)
        run: pip-audit -r src/python/requirements.txt
        continue-on-error: true

      - name: Gitleaks (secret scanning)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ github.token }}

  # --------------------------------------------------------------------------
  # Tests — pytest with coverage, gated at 90%
  # --------------------------------------------------------------------------
  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test tooling
        run: |
          pip install pytest pytest-cov pytest-asyncio
          # Runtime libs needed to import the modules under test. The Copilot
          # SDK itself is faked in tests/conftest.py (no auth/network in CI).
          pip install pydantic sqlalchemy aiosqlite

      - name: Run tests with coverage
        run: |
          set +e
          pytest --cov --cov-report=xml --cov-report=term --cov-fail-under=90
          code=$?
          # Exit code 5 = "no tests collected". Treat as success until real
          # unit tests are added under src/python/tests/.
          if [ "$code" -eq 5 ]; then
            echo "::notice::No tests collected yet. Add unit tests under src/python/tests/."
            exit 0
          fi
          exit $code

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  # --------------------------------------------------------------------------
  # CodeQL — GitHub's SAST. Results appear under Security > Code scanning.
  # --------------------------------------------------------------------------
  codeql:
    name: CodeQL (python)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    strategy:
      fail-fast: false
      matrix:
        language: ["python"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  # --------------------------------------------------------------------------
  # Auto PR — feature branch -> develop (only after the pipeline passes)
  # Runs only on a feature-branch push, never on pull_request events.
  # --------------------------------------------------------------------------
  auto-pr:
    name: Open PR into develop
    needs: [lint, security, test]
    if: ${{ github.event_name == 'push' && github.ref_type == 'branch' && !github.event.deleted }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Create or reuse PR into develop
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ github.ref_name }}
        run: |
          # Ensure the develop branch exists before targeting it
          if ! git ls-remote --exit-code --heads origin develop >/dev/null 2>&1; then
            echo "::warning::'develop' branch does not exist yet — skipping auto PR."
            exit 0
          fi

          existing=$(gh pr list --head "$BRANCH" --base develop --state open \
            --json number --jq '.[0].number' 2>/dev/null || echo "")

          if [ -n "$existing" ]; then
            echo "PR already open for $BRANCH -> develop: #$existing"
            exit 0
          fi

          gh pr create \
            --base develop \
            --head "$BRANCH" \
            --title "Merge \`$BRANCH\` into develop" \
            --body "Automated PR opened from a push to \`$BRANCH\`. Gitflow: \`$BRANCH\` → develop → main."
