# ============================================================================
# Main Pipeline
# ----------------------------------------------------------------------------
# Runs everything related to promoting code to main:
#   - On a develop push -> run the pipeline AND open/reuse a release PR to main
#   - On a pull_request -> main -> run the pipeline
#   - On a main push (release merged) -> run the pipeline for final validation
#   - Weekly schedule -> deep CodeQL scan
#
# Gitflow: feature branch -> develop -> main
# The whole pipeline (lint, security, tests, CodeQL) lives here so this file is
# the single place that governs quality gates for the main/release stage.
# ============================================================================
name: Main Pipeline

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - main
  schedule:
    # Weekly deep CodeQL scan (Mondays 06:00 UTC) to catch newly published CVEs.
    - cron: "0 6 * * 1"

concurrency:
  group: main-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # --------------------------------------------------------------------------
  # Lint — static style/quality checks with Ruff
  # --------------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff lint
        run: ruff check src/python

      - name: Ruff format check
        run: ruff format --check src/python
        continue-on-error: true

  # --------------------------------------------------------------------------
  # Security — SAST (bandit), dependency audit (pip-audit), secret scan (gitleaks)
  # --------------------------------------------------------------------------
  security:
    name: Security checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install security tools
        run: pip install "bandit[toml]" pip-audit

      - name: Bandit (SAST)
        run: bandit -c pyproject.toml -r src/python -x "*/venv/*,*/test_*.py" -ll

      - name: pip-audit (dependency vulnerabilities)
        run: pip-audit -r src/python/requirements.txt
        continue-on-error: true

      - name: Gitleaks (secret scanning)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ github.token }}

  # --------------------------------------------------------------------------
  # Tests — pytest with coverage, gated at 90%
  # --------------------------------------------------------------------------
  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test tooling
        run: |
          pip install pytest pytest-cov pytest-asyncio
          # Runtime libs needed to import the modules under test. The Copilot
          # SDK itself is faked in tests/conftest.py (no auth/network in CI).
          pip install pydantic sqlalchemy aiosqlite

      - name: Run tests with coverage
        run: |
          set +e
          pytest --cov --cov-report=xml --cov-report=term --cov-fail-under=90
          code=$?
          # Exit code 5 = "no tests collected". Treat as success until real
          # unit tests are added under src/python/tests/.
          if [ "$code" -eq 5 ]; then
            echo "::notice::No tests collected yet. Add unit tests under src/python/tests/."
            exit 0
          fi
          exit $code

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  # --------------------------------------------------------------------------
  # CodeQL — GitHub's SAST. Results appear under Security > Code scanning.
  # --------------------------------------------------------------------------
  codeql:
    name: CodeQL (python)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    strategy:
      fail-fast: false
      matrix:
        language: ["python"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  # --------------------------------------------------------------------------
  # Auto PR — develop -> main (only after the pipeline passes)
  # Runs only on a develop push, never on main pushes or pull_request events.
  # --------------------------------------------------------------------------
  auto-pr:
    name: Open release PR into main
    needs: [lint, security, test]
    if: ${{ github.event_name == 'push' && github.ref_name == 'develop' && !github.event.deleted }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Create or reuse PR develop -> main
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          existing=$(gh pr list --head develop --base main --state open \
            --json number --jq '.[0].number' 2>/dev/null || echo "")

          if [ -n "$existing" ]; then
            echo "Release PR already open develop -> main: #$existing"
            exit 0
          fi

          gh pr create \
            --base main \
            --head develop \
            --title "Release: merge develop into main" \
            --body "Automated release PR from \`develop\` into \`main\`. Review the accumulated changes before merging."
