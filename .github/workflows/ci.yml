# ============================================================================
# CI — Security, Lint, Tests and SonarCloud
# Runs on every branch push and on PRs targeting develop and main.
# Gitflow: feature branch -> develop -> main
# ============================================================================
name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - develop
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # --------------------------------------------------------------------------
  # Lint — static style/quality checks with Ruff
  # --------------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff lint
        run: ruff check src/python

      - name: Ruff format check
        run: ruff format --check src/python
        continue-on-error: true

  # --------------------------------------------------------------------------
  # Security — SAST (bandit), dependency audit (pip-audit), secret scan (gitleaks)
  # --------------------------------------------------------------------------
  security:
    name: Security checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install security tools
        run: pip install "bandit[toml]" pip-audit

      - name: Bandit (SAST)
        run: bandit -c pyproject.toml -r src/python -x "*/venv/*,*/test_*.py" -ll

      - name: pip-audit (dependency vulnerabilities)
        run: pip-audit -r src/python/requirements.txt
        continue-on-error: true

      - name: Gitleaks (secret scanning)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ github.token }}

  # --------------------------------------------------------------------------
  # Tests — pytest with coverage (produces coverage.xml for Sonar)
  # --------------------------------------------------------------------------
  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test tooling
        run: pip install pytest pytest-cov pytest-asyncio

      - name: Run tests with coverage
        run: |
          set +e
          pytest --cov --cov-report=xml --cov-report=term
          code=$?
          # Exit code 5 = "no tests collected". Treat as success until real
          # unit tests are added under a tests/ directory.
          if [ "$code" -eq 5 ]; then
            echo "::notice::No tests collected yet. Add unit tests under tests/."
            exit 0
          fi
          exit $code

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore
