<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Orchestrator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600&family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/app.css">
</head>
<body>

<header>
    <div class="logo">
        <h1>AGENT ORCHESTRATOR</h1>
        <span>GitHub Copilot SDK • Multi-Agent System</span>
    </div>
    
    <button id="add-button" class="status" aria-label="Add new agent" aria-haspopup="menu" aria-expanded="false">
        + ADD AGENT
    </button>
    
    <!-- Sample Enquiries Menu -->
    <div id="add-menu" class="add-menu hidden" role="menu" aria-label="Sample queries">
        <div class="menu-header">SAMPLE QUERIES</div>
        <div id="sample-list" role="group"></div>
    </div>
</header>

<main>
    <section class="canvas">
        <div class="metrics">
            <div>
                <h2 id="stat-active">0</h2>
                <p>ACTIVE</p>
            </div>
            <div>
                <h2 id="stat-queued">0</h2>
                <p>QUEUED</p>
            </div>
            <div>
                <h2 id="stat-done">0</h2>
                <p>DONE</p>
            </div>
        </div>
        
        <div id="flow-container" class="flow">
            <!-- Flow cards will be generated by JavaScript -->
        </div>
    </section>
    
    <aside id="sidebar">
        <h2>AGENT DETAILS</h2>
        
        <div id="sidebar-content">
            <div class="empty-state">
                <p>🤖 No agent selected</p>
                <p>Click on an agent to view details</p>
            </div>
        </div>
    </aside>
</main>

<script>
    let ws = null;
    let appState = { agents: [] };
    let selectedAgentId = null;

    // WebSocket Connection
    function connectWebSocket() {
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(`${protocol}//${window.location.host}/ws`);
        
        ws.onopen = () => console.log('WebSocket connected');
        
        ws.onmessage = (event) => {
            appState = JSON.parse(event.data);
            renderUI();
        };
        
        ws.onerror = (error) => console.error('WebSocket error:', error);
        
        ws.onclose = () => {
            console.log('WebSocket disconnected, reconnecting...');
            setTimeout(connectWebSocket, 1000);
        };
    }

    // Update UI
    function renderUI() {
        updateMetrics();
        renderFlow();
        
        // Auto-select first agent if none selected
        if (!selectedAgentId && appState.agents.length > 0) {
            selectedAgentId = appState.agents[0].id;
        }
        
        if (selectedAgentId) {
            renderSidebar(selectedAgentId);
        }
    }

    // Update metrics
    function updateMetrics() {
        const total = appState.agents.length;
        const done = appState.agents.filter(a => a.phase === 'done').length;
        const queued = appState.agents.filter(a => a.phase === 'queued').length;
        const active = total - done - queued;
        
        document.getElementById('stat-active').textContent = active;
        document.getElementById('stat-queued').textContent = queued;
        document.getElementById('stat-done').textContent = done;
    }

    // Render flow
    function renderFlow() {
        const container = document.getElementById('flow-container');
        container.innerHTML = '';
        
        // Group agents by phase
        const phases = {
            queued: { label: 'QUEUED', desc: 'Waiting Scheduler', color: 'purple', agents: [] },
            validating: { label: 'VALIDATING', desc: 'Checking query', color: 'blue', agents: [] },
            searching: { label: 'SEARCHING', desc: 'Running Semantic Search', color: 'blue', agents: [] },
            writingreport: { label: 'WRITING REPORT', desc: 'Generating response...', color: 'green', agents: [] },
            done: { label: 'DONE', desc: 'Finished successfully', color: 'green', agents: [] },
            rejectedgarbage: { label: 'REJECTED (GARBAGE)', desc: 'Invalid query', color: 'red', agents: [] },
            rejectednomatches: { label: 'REJECTED (NO MATCHES)', desc: 'No results found', color: 'red', agents: [] }
        };
        
        // Group agents
        appState.agents.forEach(agent => {
            const phaseKey = agent.phase.toLowerCase();
            const phase = phases[phaseKey];
            if (phase) {
                phase.agents.push(agent);
            }
        });
        
        // Render each phase with agents
        Object.entries(phases).forEach(([key, phase]) => {
            const card = document.createElement('div');
            const isEmpty = phase.agents.length === 0;
            card.className = `card ${phase.color}${isEmpty ? ' empty' : ''}`;

            // Build agent list HTML
            let agentsListHTML = '';
            phase.agents.forEach((agent, index) => {
                const shortId = agent.id.substring(0, 8);
                const isSelected = selectedAgentId === agent.id;
                agentsListHTML += `
                    <div class="agent-item ${isSelected ? 'selected' : ''}" data-agent-id="${agent.id}">
                        <span class="agent-badge">#${shortId}</span>
                        <span class="agent-query">${agent.enquiry.substring(0, 40)}${agent.enquiry.length > 40 ? '...' : ''}</span>
                    </div>
                `;
            });

            const countHTML = isEmpty
                ? `<div class="agent-count">No agents</div>`
                : `<div class="agent-count">${phase.agents.length} agent${phase.agents.length > 1 ? 's' : ''}</div>`;

            card.innerHTML = `
                <h3>${phase.label}</h3>
                <p>${phase.desc}</p>
                ${countHTML}
                <div class="agents-list">
                    ${agentsListHTML}
                </div>
            `;

            container.appendChild(card);

            // Add click handler for each agent item (after adding to DOM)
            card.querySelectorAll('.agent-item').forEach(item => {
                item.onclick = (e) => {
                    e.stopPropagation();
                    const agentId = item.getAttribute('data-agent-id');
                    selectedAgentId = agentId;
                    renderUI();
                };
            });

            // Add connector if not last
            if (key !== 'rejectednomatches') {
                const connector = document.createElement('div');
                connector.className = 'connector';
                container.appendChild(connector);
            }
        });
    }

    // Render sidebar
    function renderSidebar(agentId) {
        const agent = appState.agents.find(a => a.id === agentId);
        if (!agent) return;
        
        const sidebar = document.getElementById('sidebar-content');
        const createdAt = new Date(agent.startedAt).toLocaleString();
        const finishedAt = agent.finishedAt ? new Date(agent.finishedAt).toLocaleString() : 'In progress';
        
        sidebar.innerHTML = `
            <div class="panel">
                <label>QUERY</label>
                <textarea readonly>${agent.enquiry}</textarea>
            </div>
            
            <div class="panel">
                <label>STATUS</label>
                <ul>
                    <li>Agent ID <span>#${agent.id}</span></li>
                    <li>Phase <span>${agent.phase.toUpperCase()}</span></li>
                    <li>Intent <span>${agent.currentIntent || 'Processing...'}</span></li>
                </ul>
            </div>
            
            <div class="panel">
                <label>TIMELINE</label>
                <ul>
                    <li>Created <span>${createdAt}</span></li>
                    <li>Finished <span>${finishedAt}</span></li>
                    ${agent.finishedAt ? `<li>Duration <span>${Math.round((new Date(agent.finishedAt) - new Date(agent.startedAt)) / 1000)}s</span></li>` : ''}
                </ul>
            </div>
            ${agent.report ? `
            <div class="panel">
                <label>REPORT</label>
                <div class="report-content">${escapeHtml(agent.report)}</div>
            </div>
            ` : ''}
        `;
    }

    // Escapa HTML para exibir o relatório com segurança
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // Sample queries
    async function loadSamples() {
        const response = await fetch('/api/samples');
        const data = await response.json();
        const container = document.getElementById('sample-list');
        
        data.samples.forEach(enquiry => {
            const button = document.createElement('button');
            button.className = 'sample-item';
            button.textContent = enquiry;
            button.onclick = () => submitEnquiry(enquiry);
            button.setAttribute('role', 'menuitem');
            container.appendChild(button);
        });
    }

    function submitEnquiry(enquiry) {
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'create_agent', enquiry }));
            toggleMenu(); // Fecha o menu automaticamente
        }
    }

    function toggleMenu() {
        const menu = document.getElementById('add-menu');
        const button = document.getElementById('add-button');
        menu.classList.toggle('hidden');
        button.setAttribute('aria-expanded', !menu.classList.contains('hidden'));
    }

    // Menu setup
    document.getElementById('add-button').onclick = toggleMenu;
    
    document.addEventListener('click', (e) => {
        const menu = document.getElementById('add-menu');
        const button = document.getElementById('add-button');
        if (!menu.contains(e.target) && !button.contains(e.target)) {
            menu.classList.add('hidden');
            button.setAttribute('aria-expanded', 'false');
        }
    });
    
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            const menu = document.getElementById('add-menu');
            menu.classList.add('hidden');
            document.getElementById('add-button').setAttribute('aria-expanded', 'false');
        }
    });

    // Initialize
    connectWebSocket();
    loadSamples();
</script>

</body>
</html>
